name: Build CUDA wheels (fused_ssim)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build wheel (py${{ matrix.py }}-${{ matrix.wheel_tag }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    # GH Actions defaults `run:` steps to `sh -e` inside containers. The
    # jp62/cu128 branching in "Create venv and install deps" uses `[[ ]]`
    # which is a bash-ism; under sh it silently fails with
    #   sh: [[: not found
    # and the if-branch falls through to the else-branch, leading to a
    # broken `uv pip install --index-url <empty>` call. Forcing bash as
    # the default shell for this job's run: steps fixes that.
    defaults:
      run:
        shell: bash

    container:
      image: ${{ matrix.cuda_container }}

    strategy:
      fail-fast: false
      matrix:
        py: ["3.10"]
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-24.04
            torch_version: "2.8.0+cu128"
            cuda_architectures: "80;86;87;89;90;100;120+PTX"
            cuda_container: "nvidia/cuda:12.8.0-devel-ubuntu22.04"
            wheel_tag: "cu128"
            py_tag: "cp310"
            torch_index_url: "https://download.pytorch.org/whl/cu128"
          - arch: arm64
            runner: ubuntu-24.04-arm
            torch_version: "2.9.0+cu128"
            cuda_architectures: "87;89;90"
            cuda_container: "nvidia/cuda:12.8.0-devel-ubuntu22.04"
            wheel_tag: "cu128"
            py_tag: "cp310"
            torch_index_url: "https://download.pytorch.org/whl/cu128"
          # Ubuntu 22.04 to match JetPack 6.2's native rootfs — building
          # against a newer glibc/libstdc++ risks symbol-version mismatches
          # when the wheel is loaded on the Jetson at runtime.
          #
          # cudnn-devel (not plain devel): the prebuilt Jetson torch wheel
          # dynamically links against libcudnn.so.9 at import time. On the
          # Jetson itself libcudnn is supplied via nvidia-container-toolkit
          # CDI bind-mount, but the build container has no such bind-mount,
          # so cuDNN must be present in the image. Observed as:
          #   ImportError: libcudnn.so.9: cannot open shared object file
          # during the `import torch` smoke test.
          #
          # `py` is set explicitly here because this include entry introduces
          # a new `arch` value (arm64-jetson) that does NOT match any
          # combination produced by the top-level matrix axes (py × arch).
          # GitHub Actions treats such entries as fresh rows and does NOT
          # inherit the top-level `py: ["3.10"]` — ${{ matrix.py }} would
          # expand to an empty string, breaking `uv venv --python <blank>`.
          - arch: arm64-jetson
            py: "3.10"
            runner: ubuntu-24.04-arm
            torch_version: "2.9.1+jp62"
            cuda_architectures: "87"
            cuda_container: "nvidia/cuda:12.6.3-cudnn-devel-ubuntu22.04"
            wheel_tag: "jp62"
            py_tag: "cp310"

    env:
      CUDA_ARCHITECTURES: ${{ matrix.cuda_architectures }}
      FORCE_CUDA: "1"
      DEBIAN_FRONTEND: noninteractive
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OS deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3 python3-venv python3-pip python3-dev \
            git build-essential patchelf curl ca-certificates \
            libopenblas0
          rm -rf /var/lib/apt/lists/*
          ln -sf /usr/bin/python3 /usr/local/bin/python
          python3 -V
          nvcc --version

      - name: Stub libs the prebuilt Jetson torch wheel links against
        # The dusty-nv torch 2.9.1+jp62 wheel has DT_NEEDED entries for
        # libraries that on the Jetson are bind-mounted by
        # nvidia-container-toolkit CDI but are NOT present in the cuda
        # base image we use here as a build container:
        #
        #   libcufile.so.0   (NVIDIA GPUDirect Storage)
        #   libcudss.so.0    (NVIDIA cuDSS — sparse direct solver)
        #   libcupti.so.12   (CUDA Profiling Tools — not always in /usr/lib)
        #
        # Without these, `import torch` fails at load time with
        # `ImportError: lib*.so.*: cannot open shared object file`,
        # which kills setup.py before it can compile our extension.
        #
        # We don't need REAL versions of these libraries — `import torch`
        # only triggers DT_NEEDED resolution, which is satisfied as long
        # as the file exists with the right SONAME. Symbols are bound
        # lazily, and torch only calls cufile/cudss/cupti from features
        # we don't exercise during build. So we synthesize empty .so
        # files with the right SONAMEs and put them on the loader path.
        if: matrix.wheel_tag == 'jp62'
        run: |
          set -eux
          mkdir -p /usr/local/lib/torch-stubs
          printf '%s\n' 'void __torch_stub_noop(void) {}' > /tmp/stub.c
          for soname in libcufile.so.0 libcudss.so.0 libcupti.so.12; do
            gcc -shared -fPIC -Wl,-soname,"$soname" \
              -o "/usr/local/lib/torch-stubs/$soname" /tmp/stub.c
          done
          rm /tmp/stub.c
          echo /usr/local/lib/torch-stubs > /etc/ld.so.conf.d/torch-stubs.conf
          ldconfig
          ldconfig -p | grep -E 'libcufile|libcudss|libcupti' || true

      # Install the GitHub CLI so the jp62 row can download the private
      # pytorch-jetson wheel via `gh release download`.  We install it
      # universally (it is a small binary) rather than conditionally to
      # avoid extra YAML complexity; on the cu128 rows it is simply unused.
      - name: Install gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] \
            https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          apt-get install -y --no-install-recommends gh
          rm -rf /var/lib/apt/lists/*

      - name: Install uv
        run: |
          python3 -m pip install -U uv
          echo 'export PATH="$HOME/.local/bin:$PATH"' >> $GITHUB_ENV

      - name: Install CPython ${{ matrix.py }} via uv
        run: uv python install ${{ matrix.py }}

      - name: Create venv and install deps
        # PHASE-C: The jp62 branch requires the secret PYTORCH_JETSON_READ_TOKEN
        # to be created in the fused-ssim repo settings
        # (Settings → Secrets and variables → Actions → New repository secret).
        # The secret must hold a Classic PAT (or fine-grained PAT with
        # Contents:read + Metadata:read) for an account that has read access to
        # the PRIVATE resight-xr/pytorch-jetson repository.
        # Without it, `gh release download` will fail with 404 / auth error.
        # GH_TOKEN resolves to an empty string on cu128 rows (the secret is only
        # needed for jp62); this is intentional and harmless because `gh` is
        # only invoked inside the `if [[ wheel_tag == jp62 ]]` branch below.
        env:
          GH_TOKEN: ${{ secrets.PYTORCH_JETSON_READ_TOKEN }}
        run: |
          uv venv --python ${{ matrix.py }} .venv
          uv pip install -p .venv --upgrade pip
          uv pip install -p .venv wheel setuptools build numpy ninja packaging
          if [[ "${{ matrix.wheel_tag }}" == "jp62" ]]; then
            # Jetson wheels come from the private pytorch-jetson release, not PyPI.
            # Private-repo download requires gh CLI + GH_TOKEN (PYTORCH_JETSON_READ_TOKEN).
            # PHASE-C: `latest` is a mutable release tag — if the torch version
            # published under `latest` diverges from matrix.torch_version, the
            # --pattern below will match nothing and the zero-match guard below
            # will surface the mismatch.  Once torch versions stabilise, pin
            # this to a versioned release tag (e.g. `v2.9.1-jp62`) instead.
            gh release download latest \
              --repo resight-xr/pytorch-jetson \
              --pattern "torch-${{ matrix.torch_version }}-${{ matrix.py_tag }}-${{ matrix.py_tag }}-linux_aarch64.whl" \
              --dir /tmp/jetson-torch
            # Guard: if the pattern matched nothing, gh exits 0 silently — catch that here.
            ls /tmp/jetson-torch/torch-*.whl >/dev/null 2>&1 || {
              echo "ERROR: gh release download matched no assets for pattern torch-${{ matrix.torch_version }}-${{ matrix.py_tag }}-${{ matrix.py_tag }}-linux_aarch64.whl"
              echo "Listing /tmp/jetson-torch:"
              ls -la /tmp/jetson-torch/ 2>&1 || echo "(directory does not exist)"
              exit 1
            }
            uv pip install -p .venv /tmp/jetson-torch/torch-*.whl
          else
            uv pip install -p .venv --index-url ${{ matrix.torch_index_url }} "torch==${{ matrix.torch_version }}"
          fi
          ./.venv/bin/python -c "import torch; print(f'torch={torch.__version__} cuda={torch.version.cuda}')"

      - name: Build wheel
        run: |
          mkdir -p dist
          # Inject the matrix wheel_tag into the version so both METADATA and
          # filename carry the local version identifier (e.g. +cu128, +jp62).
          # Double-quoted sed expression required so ${{ matrix.wheel_tag }} expands;
          # wheel_tag is matrix-controlled (trusted), not user input.
          sed -i "s/^version = \"\([^\"]*\)\"/version = \"\1+${{ matrix.wheel_tag }}\"/" pyproject.toml
          grep '^version' pyproject.toml
          ./.venv/bin/python -m build --wheel --no-isolation --outdir dist
          ls -lh dist/

      # PHASE-C: Watch this step on first CI run — it surfaces CUDA linkage
      # failures (missing symbols, wrong libcudart) that only appear at import.
      - name: Verify wheel imports
        run: |
          uv pip install -p .venv dist/*.whl --no-deps
          ./.venv/bin/python -c "import fused_ssim; print('fused_ssim import OK')"

      # Artifact names are unique via the (wheel_tag, arch) combination.
      # `arch: arm64-jetson` is load-bearing here — it distinguishes the jp62
      # artifact from the plain arm64/cu128 artifact, not just a cosmetic label.
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-py${{ matrix.py }}-${{ matrix.wheel_tag }}-${{ matrix.arch }}
          path: dist/*.whl
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - name: Checkout
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release tag
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "RELEASE_TAG=latest" >> $GITHUB_ENV
            echo "RELEASE_NAME=latest (main)" >> $GITHUB_ENV
          else
            tag="${GITHUB_REF#refs/tags/}"
            echo "RELEASE_TAG=$tag" >> $GITHUB_ENV
            echo "RELEASE_NAME=$tag" >> $GITHUB_ENV
          fi

      - name: Move latest tag (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push -f origin latest

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: wheels

      - name: List wheels
        run: |
          echo "Downloaded wheels:"
          find wheels -type f -name '*.whl' -print
          test -n "$(find wheels -type f -name '*.whl' -print -quit)" || { echo "No wheels found"; exit 1; }

      - name: Upload wheels to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build CUDA wheels with uv (fused_ssim)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*", "latest" ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build wheels (py${{ matrix.py }} torch${{ matrix.torch.cuda }})
    runs-on: ubuntu-24.04

    # Use a CUDA devel image so nvcc & headers are available
    container:
      # Smaller base image; install only the CUDA bits we need below
      image: nvidia/cuda:12.1.1-base-ubuntu22.04

    strategy:
      fail-fast: false
      matrix:
        py: [ "3.10", "3.11", "3.12"]
        torch:
          - version: "2.5.1+cu121"
            index: "https://download.pytorch.org/whl/cu121"
            cuda: "cu121"
          - version: "2.8.0+cu128"
            index: "https://download.pytorch.org/whl/cu128"
            cuda: "cu128"

    env:
      # Change to match what you want to target
      TORCH_CUDA_ARCH_LIST: "8.6;8.9;9.0"
      FORCE_CUDA: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OS deps (python3, pip, toolchain)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3 python3-venv python3-pip python3-dev \
            git build-essential \
            patchelf curl ca-certificates \
            cuda-compiler-12-1 cuda-cudart-dev-12-1
          rm -rf /var/lib/apt/lists/*
          ln -sf /usr/bin/python3 /usr/local/bin/python
          python3 -V
          nvcc --version

      - name: Install uv (system python)
        run: |
          python3 -m pip install -U uv
          # make sure uv’s local installs are reachable if needed
          echo 'export PATH="$HOME/.local/bin:$PATH"' >> $GITHUB_ENV

      - name: Install CPython ${{ matrix.py }} via uv
        run: |
          python3 -m uv python install ${{ matrix.py }}

      - name: Create venv (py${{ matrix.py }}) with uv
        run: |
          python3 -m uv venv --python ${{ matrix.py }} .venv-${{ matrix.py }}
          ./.venv-${{ matrix.py }}/bin/python -V

      - name: Install build deps into venv using uv (no system pip needed)
        run: |
          # Install/upgrade pip into the venv (works even if pip isn't there yet)
          python3 -m uv pip install -p .venv-${{ matrix.py }} --upgrade pip
          # Core build deps
          python3 -m uv pip install -p .venv-${{ matrix.py }} wheel setuptools build numpy ninja packaging
          # CUDA-enabled PyTorch
          python3 -m uv pip install -p .venv-${{ matrix.py }} --index-url ${{ matrix.torch.index }} "torch==${{ matrix.torch.version }}"
          # Sanity print
          ./.venv-${{ matrix.py }}/bin/python - << 'PY'
          import sys, torch
          print("Python:", sys.version.split()[0])
          print("Torch:", torch.__version__)
          print("Torch CUDA (build):", torch.version.cuda)
          PY

      - name: Build wheel (no isolation; uses this venv so tags match)
        run: |
          mkdir -p dist/py${{ matrix.py }}/${{ matrix.torch.cuda }}
          ./.venv-${{ matrix.py }}/bin/python -m build --wheel --no-isolation --outdir dist/py${{ matrix.py }}/${{ matrix.torch.cuda }}
          # Add CUDA flavor into the wheel filename so different CUDA builds don't overwrite
          python3 - << 'PY'
          from pathlib import Path
          import re, sys

          cuda = "${{ matrix.torch.cuda }}"
          wheel_dir = Path("dist/py${{ matrix.py }}/${{ matrix.torch.cuda }}")
          for wheel in wheel_dir.glob("*.whl"):
              m = re.match(r"^(?P<name>[^-]+)-(?P<version>[^-]+)-(?P<rest>.+)$", wheel.name)
              if not m:
                  print(f"Skipping unexpected wheel name: {wheel.name}", file=sys.stderr)
                  continue
              new_name = f"{m.group('name')}-{m.group('version')}+{cuda}-{m.group('rest')}"
              wheel.rename(wheel.with_name(new_name))
              print(f"Renamed {wheel.name} -> {new_name}")
          PY
          ls -al dist/py${{ matrix.py }}/${{ matrix.torch.cuda }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-py${{ matrix.py }}-${{ matrix.torch.cuda }}
          path: dist/py${{ matrix.py }}/${{ matrix.torch.cuda }}/*.whl
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - name: Checkout (for tagging latest)
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release tag/name
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "RELEASE_TAG=latest" >> $GITHUB_ENV
            echo "RELEASE_NAME=latest (main)" >> $GITHUB_ENV
          else
            tag="${GITHUB_REF#refs/tags/}"
            echo "RELEASE_TAG=$tag" >> $GITHUB_ENV
            echo "RELEASE_NAME=$tag" >> $GITHUB_ENV
          fi

      - name: Move latest tag to current commit (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push -f origin latest

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          # flatten multiple artifacts into a single folder
          merge-multiple: true
          path: wheels

      - name: List wheels
        run: |
          echo "Downloaded wheels:"
          find wheels -type f -name '*.whl' -print
          # hard fail if nothing was downloaded
          test -n "$(find wheels -type f -name '*.whl' -print -quit)" || { echo "No wheels found in artifacts"; exit 1; }

      - name: Upload wheels to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

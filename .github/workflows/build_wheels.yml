name: Build CUDA wheels (fused_ssim)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build wheel (py${{ matrix.py }}-cu128-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    strategy:
      fail-fast: false
      matrix:
        py: ["3.11"]
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-24.04
            torch_version: "2.8.0+cu128"
            cuda_architectures: "80;86;87;89;90"
          - arch: arm64
            runner: ubuntu-24.04-arm
            torch_version: "2.9.0+cu128"
            cuda_architectures: "87;89;90"

    env:
      CUDA_ARCHITECTURES: ${{ matrix.cuda_architectures }}
      FORCE_CUDA: "1"
      DEBIAN_FRONTEND: noninteractive
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OS deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3 python3-venv python3-pip python3-dev \
            git build-essential patchelf curl ca-certificates
          rm -rf /var/lib/apt/lists/*
          ln -sf /usr/bin/python3 /usr/local/bin/python
          python3 -V
          nvcc --version

      - name: Install uv
        run: |
          python3 -m pip install -U uv
          echo 'export PATH="$HOME/.local/bin:$PATH"' >> $GITHUB_ENV

      - name: Install CPython ${{ matrix.py }} via uv
        run: uv python install ${{ matrix.py }}

      - name: Create venv and install deps
        run: |
          uv venv --python ${{ matrix.py }} .venv
          uv pip install -p .venv --upgrade pip
          uv pip install -p .venv wheel setuptools build numpy ninja packaging
          uv pip install -p .venv --index-url https://download.pytorch.org/whl/cu128 "torch==${{ matrix.torch_version }}"
          ./.venv/bin/python -c "import torch; print(f'torch={torch.__version__} cuda={torch.version.cuda}')"

      - name: Build wheel
        run: |
          mkdir -p dist
          # Inject +cu128 into version so both METADATA and filename match
          sed -i 's/^version = "\([^"]*\)"/version = "\1+cu128"/' pyproject.toml
          grep '^version' pyproject.toml
          ./.venv/bin/python -m build --wheel --no-isolation --outdir dist
          ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-py${{ matrix.py }}-cu128-${{ matrix.arch }}
          path: dist/*.whl
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - name: Checkout
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release tag
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "RELEASE_TAG=latest" >> $GITHUB_ENV
            echo "RELEASE_NAME=latest (main)" >> $GITHUB_ENV
          else
            tag="${GITHUB_REF#refs/tags/}"
            echo "RELEASE_TAG=$tag" >> $GITHUB_ENV
            echo "RELEASE_NAME=$tag" >> $GITHUB_ENV
          fi

      - name: Move latest tag (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push -f origin latest

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: wheels

      - name: List wheels
        run: |
          echo "Downloaded wheels:"
          find wheels -type f -name '*.whl' -print
          test -n "$(find wheels -type f -name '*.whl' -print -quit)" || { echo "No wheels found"; exit 1; }

      - name: Upload wheels to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
